# docker-compose.yml - ИСПРАВЛЕННАЯ ВЕРСИЯ!
version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TOKEN=${TOKEN}
      - PORT=3000
      - WEBHOOK_URL=http://91.227.68.137:3000/webhook
    restart: always
    volumes:
      - ./data:/app/data
