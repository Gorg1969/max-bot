version: '3.8'

services:
  web:
    build: .
    container_name: maxbot-web
    restart: unless-stopped   # Перезапуск только если упал
    ports:
      - "3000:3000"
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - TOKEN=${TOKEN}
      - DATA_DIR=/app/data
      - MAX_API_URL=https://platform-api2.max.ru
      - BASE_URL=${BASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=INFO
      - PORT=3000
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=/app/data/maxbot.db
      - SSL_VERIFY=${SSL_VERIFY:-true}
      - SSL_CERT_CONTENT=${SSL_CERT_CONTENT}
    volumes:
      - ./data:/app/data
    # Команда теперь в supervisor, не нужна
