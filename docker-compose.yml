version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: maxbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    container_name: maxbot-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - TOKEN=${TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - MAX_API_URL=https://platform-api2.max.ru
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=3000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: gunicorn -c gunicorn.conf.py app:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    container_name: maxbot-worker
    restart: unless-stopped
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - TOKEN=${TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - MAX_API_URL=https://platform-api2.max.ru
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    command: python worker.py
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.Redis(host='redis', port=6379); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
