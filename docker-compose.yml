version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: maxbot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=maxbot
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maxbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - maxbot-network  # ✅ Добавить сеть

  redis:
    image: redis:7-alpine
    container_name: maxbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - maxbot-network  # ✅ Добавить сеть

  web:
    build: .
    container_name: maxbot-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - TOKEN=${TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/maxbot
      - DATA_DIR=/app/data
      - MAX_API_URL=https://platform-api2.max.ru
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PORT=3000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maxbot-network  # ✅ Добавить сеть
    command: gunicorn -c gunicorn.conf.py app:app

  worker:
    build: .
    container_name: maxbot-worker
    restart: unless-stopped
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - TOKEN=${TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/maxbot
      - DATA_DIR=/app/data
      - MAX_API_URL=https://platform-api2.max.ru
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - maxbot-network  # ✅ Добавить сеть
    command: python worker.py

volumes:
  postgres_data:
  redis_data:

networks:
  maxbot-network:  # ✅ ОПРЕДЕЛИТЬ СЕТЬ
    driver: bridge
