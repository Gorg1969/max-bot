version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: maxbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  web:
    build: .
    container_name: maxbot-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key}
    volumes:
      - ./data:/app/data
      - ./modules:/app/modules
    depends_on:
      - redis
    command: gunicorn -c gunicorn.conf.py app:app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    container_name: maxbot-worker
    restart: unless-stopped
    environment:
      - MAX_TOKEN=${MAX_TOKEN}
      - REDIS_URL=redis://redis:6379/0
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - ./modules:/app/modules
    depends_on:
      - redis
    command: python worker.py
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.Redis.from_url('redis://redis:6379/0').ping()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
