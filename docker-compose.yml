version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - TOKEN=${TOKEN}
      - PORT=3000
      - WEBHOOK_URL=http://bot:3000/webhook
    restart: always
    volumes:
      - ./data:/app/data
    networks:
      - max-bot-network

networks:
  max-bot-network:
    external: true
